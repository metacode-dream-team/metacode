version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: metacode-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: metacode
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - metacode
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g

  keycloak:
    image: quay.io/keycloak/keycloak:26.3.1
    container_name: metacode-keycloak
    command: start-dev --http-relative-path /auth
    ports:
      - "8080:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_HOST: postgres
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_DB_URL_DATABASE: metacode
      KC_DB_SCHEMA: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"

      KAFKA_BOOTSTRAP_SERVERS: "metacode-kafka:9092"
      KAFKA_TOPIC: "user-events"
    volumes:
      - /home/user/keycloak-theme:/opt/keycloak/themes/keycloak-theme
      - /home/user/keycloak-event-listener.jar:/opt/keycloak/providers/keycloak-event-listener.jar
    depends_on:
      - postgres
      - kafka
    networks:
      - metacode
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

  redis:
    image: redis:7
    container_name: metacode-redis
    ports:
      - "6379:6379"
    networks:
      - metacode
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256m

  mongodb:
    image: mongo:6
    container_name: metacode-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongopass
    networks:
      - metacode
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: metacode-minio
    ports:
      - "9000:9000"
      - "9090:9090"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9090"
    volumes:
      - minio-data:/data
    networks:
      - metacode
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: metacode-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - metacode
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256m

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: metacode-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    networks:
      - metacode
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512m

  kafbat-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    container_name: metacode-kafka-ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: metacode-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: 'true'
    depends_on:
      - kafka
    networks:
      - metacode
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256m

  mailhog:
    image: mailhog/mailhog
    container_name: metacode-mailhog
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - metacode
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256m

volumes:
  pgdata:
  keycloak-pgdata:
  mongo-data:
  minio-data:

networks:
  metacode:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16