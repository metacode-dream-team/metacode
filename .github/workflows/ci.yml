name: Deploy Docker Compose to Server

on:
  push:
    branches:
      - main

jobs:
  deploy-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check docker-compose-remote.yaml changes
        id: check_changes
        run: |
          git fetch origin main
          if git diff --name-only HEAD~1 HEAD | grep -q "docker-compose-remote.yaml"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to server if changed
        if: steps.check_changes.outputs.changed == 'true'
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: 22
          source: "docker-compose-remote.yaml"
          target: "/home/user/docker-compose.yaml"

      - name: Restart containers
        if: steps.check_changes.outputs.changed == 'true'
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          script: |
            cd /home/user
            docker compose up -d