name: Deploy Docker Compose to Server

on:
  push:
    branches:
      - main

jobs:
  deploy-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}
          ssh-passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}

      - name: Copy docker-compose.yaml to server
        run: |
          scp -o StrictHostKeyChecking=no ./docker-compose-remote.yaml \
          ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/user/docker-compose.yaml

      - name: Start or restart containers
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
          'cd /home/user && docker compose up -d'