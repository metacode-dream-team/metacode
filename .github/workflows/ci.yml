name: Deploy Docker Compose to Server

on:
  push:
    branches:
      - main

jobs:
  deploy-compose:
    runs-on: ubuntu-latest

    steps:
      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Deploy docker-compose remotely
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            mkdir -p /home/user/metacode
            cd /home/user/metacode

            if [ ! -d ".git" ]; then
              git clone https://${{ secrets.DEPLOY_PAT }}@github.com/metacode-dream-team/metacode.git .
            else
              git pull
            fi

            cp docker-compose-remote.yaml /home/user/docker-compose.yaml

            cd /home/user
            docker compose up -d
          EOF
        env:
          DEPLOY_PAT: ${{ secrets.DEPLOY_PAT }}